<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Ratnam Sarees</title>
    <link rel="stylesheet" href="./style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--bg-color);
        }
        .login-box {
            background: white;
            padding: 48px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 440px;
            text-align: center;
        }
        .login-box .logo {
            justify-content: center;
            margin-bottom: 8px;
        }
        .login-box p {
            color: var(--text-light);
            margin-bottom: 32px;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-main);
            font-size: 0.9rem;
        }
        .form-control {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            font-size: 1rem;
            transition: var(--transition);
        }
        .form-control:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        .error-message {
            color: #d32f2f;
            background: #ffebee;
            padding: 12px;
            border-radius: var(--radius-sm);
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <a href="index.html" class="logo">Ratnam<span>Sarees</span></a>
        <p>Admin Control Panel</p>
        
        <div id="error-message" class="error-message"></div>

        <form id="adminLoginForm">
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" id="email" class="form-control" required placeholder="admin@ratnamsarees.com">
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" id="password" class="form-control" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-primary" style="width: 100%; margin-top: 16px;">Login to Dashboard</button>
        </form>

    <!-- Auth Script -->
    <script type="module">
        import { USE_FIREBASE, fbAuth } from './firebase.js';

        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('error-message');
            
            try {
                if (USE_FIREBASE) {
                    await fbAuth.login(email, password);
                    sessionStorage.setItem('isAdminLoggedIn', 'true');
                    window.location.href = 'admin-dashboard.html';
                } else {
                    // Fallback local mock mode if firebase is off
                    if (email === 'admin@test.com' && password === 'admin123') {
                        sessionStorage.setItem('isAdminLoggedIn', 'true');
                        window.location.href = 'admin-dashboard.html';
                    } else {
                        throw new Error('Invalid credentials');
                    }
                }
            } catch (err) {
                errorEl.style.display = 'block';
                errorEl.textContent = 'Invalid credentials. Please try again.';
            }
        });

        // Redirect if already logged in
        if (sessionStorage.getItem('isAdminLoggedIn') === 'true') {
            window.location.href = 'admin-dashboard.html';
        }
    </script>
</body>
</html>
